<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tachograf MZA PRO</title>

<style>
body{margin:0;background:#111;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh}
.tacho{width:420px;background:#000;border-radius:25px;box-shadow:0 0 40px #0f0;padding:15px;color:#0f0}
.screen{background:#020;border-radius:10px;padding:12px;text-align:center;box-shadow:inset 0 0 20px #0f0}
.buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.btn{border:2px solid #0f0;border-radius:50%;height:70px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.logs{margin-top:10px;height:120px;overflow:auto;background:#000;padding:5px;font-size:11px}
.green{color:lime}
.red{color:red}
.orange{color:orange}
.log-item{cursor:pointer}
</style>

</head>
<body>

<div class="tacho">
<div class="screen">
<div id="time"></div>
<div>PRACA: <span id="work">00:00</span></div>
<div>JAZDA: <span id="drive">00:00</span></div>
<div id="breakStatus"></div>
<div id="systemStatus"></div>
<div id="card" class="red">BRAK KARTY</div>
</div>

<div class="buttons">
<div class="btn" onclick="insertCard()">🪪</div>
<div class="btn" onclick="startDay()">▶</div>
<div class="btn" onclick="setMode('JAZDA')">🚚</div>
<div class="btn" onclick="setMode('PRACA')">🔧</div>
<div class="btn" onclick="setMode('PRZERWA')">☕</div>
<div class="btn" onclick="endDay()">⏹</div>
<div class="btn" onclick="resetAll()">⟳</div>
</div>

<div class="logs" id="logs"></div>
</div>

<script>

// 🔥 PRZYWRACANIE
let work = parseInt(localStorage.getItem("tacho_work")) || 0;
let drive = parseInt(localStorage.getItem("tacho_drive")) || 0;
let mode = localStorage.getItem("tacho_mode") || "";
let logs = JSON.parse(localStorage.getItem("tacho_logs") || "[]");

let breakTotal = parseInt(localStorage.getItem("tacho_break_total")) || 0;
let breakRequired = parseInt(localStorage.getItem("tacho_break_req")) || 0;

let timer = null;
let card = localStorage.getItem("tacho_card") === "true";

// START
updateDisplay();
updateBreakStatus();
updateSystem();
renderLogs();

if(card){
document.getElementById("card").innerText="KARTA OK";
document.getElementById("card").className="green";
}

if(mode){
setMode(mode);
}

// CLOCK
setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleString();
},1000);

// FORMAT
function format(ms){
let s=Math.floor(ms/1000);
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
return("0"+h).slice(-2)+":"+("0"+m).slice(-2);
}

// KARTA
function insertCard(){
card=true;
localStorage.setItem("tacho_card", true);
document.getElementById("card").innerText="KARTA OK";
document.getElementById("card").className="green";
log("KARTA WLOZONA");
updateSystem();
}

// START DNIA (MZA)
function startDay(){
if(!card){log("NARUSZENIE BRAK KARTY");updateSystem();return}

let driveH=parseInt(prompt("Planowana jazda (h):"));

// 🔥 MZA PRZERWY
if(driveH>=6 && driveH<=8) breakRequired = 30*60000;
else if(driveH>8) breakRequired = 45*60000;
else breakRequired = 0;

breakTotal = 0;

saveState();
updateBreakStatus();
log("START DNIA | przerwy:"+ (breakRequired/60000)+" min");
}

// TRYB
function setMode(m){
if(!card){log("NARUSZENIE BRAK KARTY");updateSystem();return}

mode=m;
localStorage.setItem("tacho_mode", mode);
log("TRYB "+m);

if(timer) clearInterval(timer);

timer=setInterval(()=>{

if(mode==="JAZDA"){
work+=1000;
drive+=1000;
}

if(mode==="PRACA"){
work+=1000;
}

if(mode==="PRZERWA"){
work+=1000;
breakTotal+=1000;

localStorage.setItem("tacho_break_total", breakTotal);

if(breakTotal % (15*60000) === 0){
log("PRZERWA "+Math.floor(breakTotal/60000)+" min");
}
}

updateDisplay();
updateBreakStatus();
saveState();

},1000);
}

// WYŚWIETLANIE
function updateDisplay(){
document.getElementById("work").innerText=format(work);
document.getElementById("drive").innerText=format(drive);
}

// PRZERWY MZA
function updateBreakStatus(){
let el=document.getElementById("breakStatus");

let doneMin = Math.floor(breakTotal/60000);
let reqMin = Math.floor(breakRequired/60000);

if(reqMin===0){
el.innerHTML="PRZERWY: BRAK";
}
else if(breakTotal >= breakRequired){
el.innerHTML="<span class='green'>PRZERWY OK "+doneMin+"/"+reqMin+" min</span>";
}
else if(breakTotal > 0){
el.innerHTML="<span class='orange'>PRZERWY "+doneMin+"/"+reqMin+" min</span>";
}
else{
el.innerHTML="<span class='red'>PRZERWY 0/"+reqMin+" min</span>";
}

updateSystem();
}

// SYSTEM
function updateSystem(){
let ok=true;

if(!card) ok=false;
if(breakRequired>0 && breakTotal<breakRequired) ok=false;

let el=document.getElementById("systemStatus");

if(ok){
el.innerHTML="<span class='green'>SYSTEM OK</span>";
}else{
el.innerHTML="<span class='red'>SYSTEM NARUSZENIE</span>";
}
}

// LOGI
function log(txt){
let t=new Date().toLocaleTimeString();
logs.push(t+" - "+txt);
localStorage.setItem("tacho_logs", JSON.stringify(logs));
renderLogs();
}

// 🔥 EDYCJA LOGÓW
function renderLogs(){
let html="";
logs.forEach((l,i)=>{
html+=`<div class="log-item" onclick="editLog(${i})">${l}</div>`;
});
document.getElementById("logs").innerHTML=html;
}

function editLog(i){
let e=prompt("Edytuj log:", logs[i]);
if(e){
logs[i]=e;
localStorage.setItem("tacho_logs", JSON.stringify(logs));
renderLogs();
}
}

// ZAPIS
function saveState(){
localStorage.setItem("tacho_work", work);
localStorage.setItem("tacho_drive", drive);
localStorage.setItem("tacho_break_req", breakRequired);
}

// KONIEC
function endDay(){
log("KONIEC DNIA");
localStorage.setItem("tacho_mode","");
}

// RESET
function resetAll(){
localStorage.clear();
location.reload();
}

</script>
</body>
</html>
