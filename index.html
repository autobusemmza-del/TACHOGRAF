<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACHOGRAF MZA PRO v3.5</title>

<style>
body{margin:0;background:#0a0a0a;color:#00ff88;font-family:monospace;}
.container{padding:10px;}

.display{
  background:#000;border-radius:15px;padding:15px;
  box-shadow:0 0 25px #00ff88;
}

.time{text-align:center;font-size:18px;}
.status{margin-top:10px;padding:5px;border:1px solid #333;text-align:center;}

button{
  width:100%;margin:5px 0;padding:12px;
  background:#111;color:#00ff88;border:none;
}

.logs{margin-top:10px;max-height:200px;overflow:auto;background:#000;border:1px solid #333;}
.log-item{padding:6px;border-bottom:1px solid #222;cursor:pointer;}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  display:none;justify-content:center;align-items:center;
  z-index:99999;
}

.box{
  background:#111;padding:20px;border:2px solid #00ff88;width:85%;
}

.box input{width:100%;padding:10px;margin:5px 0;}

.print{
  display:none;background:white;color:black;
  font-family:monospace;padding:10px;
}

.ticket{width:260px;margin:auto;font-size:12px;}
.center{text-align:center;}
.line{border-top:1px dashed black;margin:5px 0;}

@media print {
  body * { display:none; }
  #printArea, #printArea * { display:block; }
}
</style>
</head>

<body>

<div class="container">

<div class="display">
<div id="time"></div>
<div id="mode">TRYB: ---</div>

<div>PRACA (real): <span id="workReal"></span></div>
<div>JAZDA (real): <span id="driveReal"></span></div>

</div>

<button onclick="openCard()">WŁÓŻ KARTĘ</button>
<button onclick="setMode('jazda')">JAZDA</button>
<button onclick="setMode('praca')">INNA PRACA</button>
<button onclick="setMode('przerwa')">PRZERWA</button>
<button onclick="openEndModal()">KONIEC PRACY</button>
<button onclick="printLogs()">WYDRUK</button>
<button onclick="weeklyReport()">RAPORT TYGODNIOWY</button>
<button onclick="resetAll()">RESET</button>

<div class="logs" id="logs"></div>

</div>

<!-- KARTA -->
<div class="modal" id="cardModal">
<div class="box">
<input id="cardName" placeholder="Imię">
<input id="cardSurname" placeholder="Nazwisko">
<input id="cardNumber" placeholder="Nr karty">
<button onclick="insertCard()">START</button>
<button onclick="closeCard()">ANULUJ</button>
</div>
</div>

<!-- EDYCJA -->
<div class="modal" id="editModal">
<div class="box">
<input id="editDate">
<input id="editTime">
<input id="editText">
<button onclick="saveLog()">ZAPISZ</button>
<button onclick="deleteLog()">USUŃ</button>
<button onclick="closeEdit()">ANULUJ</button>
</div>
</div>

<!-- KONIEC -->
<div class="modal" id="endModal">
<div class="box">
<input id="endHour" placeholder="Godzina hh:mm">
<input id="endKm" placeholder="KM">
<button onclick="saveEnd()">ZAPISZ</button>
<button onclick="closeEnd()">ANULUJ</button>
</div>
</div>

<div id="printArea" class="print"></div>

<script>
let state = JSON.parse(localStorage.getItem("tacho")) || {
  realWork:0, realDrive:0,
  mode:"---", last:Date.now(),
  logs:[], driver:null
};

let editIndex=null;

/* TIME */
setInterval(()=>{
  time.innerText=new Date().toLocaleString("pl-PL");
},1000);

/* FORMAT */
function f(ms){
  let m=Math.floor(ms/60000);
  let h=Math.floor(m/60);
  m=m%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* TICK */
setInterval(()=>{
  let now=Date.now();
  let diff=now-state.last;

  if(state.mode==="jazda"){
    state.realDrive+=diff;
    state.realWork+=diff;
  }
  else if(state.mode==="praca"){
    state.realWork+=diff;
  }

  state.last=now;
  save(); render();
},1000);

/* RENDER */
function render(){
  workReal.innerText=f(state.realWork);
  driveReal.innerText=f(state.realDrive);
  mode.innerText="TRYB: "+state.mode;

  logs.innerHTML="";
  state.logs.forEach((l,i)=>{
    let div=document.createElement("div");
    div.className="log-item";
    div.innerText=l.date+" "+l.time+" | "+l.text;
    div.onclick=()=>editLog(i);
    logs.appendChild(div);
  });
}

/* LOG */
function addLog(t){
  let d=new Date();
  state.logs.unshift({
    date:d.toISOString().slice(0,10),
    time:d.toTimeString().slice(0,5),
    text:t
  });
}

/* TRYB */
function setMode(m){
  if(!state.driver){alert("Włóż kartę!");return;}
  state.mode=m;
  addLog("TRYB: "+m);
}

/* KARTA */
function openCard(){cardModal.style.display="flex";}
function closeCard(){cardModal.style.display="none";}

function insertCard(){
  state.driver={
    name:cardName.value,
    surname:cardSurname.value,
    number:cardNumber.value
  };
  addLog("KARTA WLOZONA");
  closeCard();
}

/* EDYCJA */
function editLog(i){
  editIndex=i;
  let l=state.logs[i];
  editDate.value=l.date;
  editTime.value=l.time;
  editText.value=l.text;
  editModal.style.display="flex";
}

function saveLog(){
  let l=state.logs[editIndex];
  l.date=editDate.value;
  l.time=editTime.value;
  l.text=editText.value;
  closeEdit(); save();
}

function deleteLog(){
  state.logs.splice(editIndex,1);
  closeEdit(); save();
}

function closeEdit(){editModal.style.display="none";}

/* KONIEC DNIA = ODPOCZYNEK */
function openEndModal(){endModal.style.display="flex";}
function closeEnd(){endModal.style.display="none";}

function saveEnd(){
  addLog("KONIEC "+endHour.value+" KM:"+endKm.value);
  addLog("ODPOCZYNEK");
  state.mode="odpoczynek";
  closeEnd();
}

/* WYDRUK */
function printLogs(){
  function toDate(l){
    let [y,m,d]=l.date.split("-").map(Number);
    let [hh,mm]=l.time.split(":").map(Number);
    return new Date(y,m-1,d,hh,mm);
  }

  let sorted=[...state.logs].sort((a,b)=>toDate(a)-toDate(b));

  let html=`<div class="ticket">
  <div class="center">*** SIEMENS VDO ***</div>
  <div class="line"></div>
  KIEROWCA:<br>${state.driver?.name||""} ${state.driver?.surname||""}<br>
  NR: ${state.driver?.number||""}
  <div class="line"></div>`;

  sorted.forEach(l=>{
    html+=`${l.date} ${l.time}<br>${l.text}<div class="line"></div>`;
  });

  html+=`*** END ***</div>`;

  printArea.innerHTML=html;
  printArea.style.display="block";
  window.print();
}

/* RAPORT */
function weeklyReport(){
  alert("Raport tygodniowy działa — rozbudujemy w kolejnym kroku 😎");
}

/* RESET */
function resetAll(){localStorage.removeItem("tacho");location.reload();}
function save(){localStorage.setItem("tacho", JSON.stringify(state));}

render();
</script>

</body>
</html>
