<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACHOGRAF MZA PRO v4.1</title>

<style>
body{margin:0;background:#0a0a0a;color:#00ff88;font-family:monospace;}
.container{padding:10px;}

.display{
  background:#000;border-radius:15px;padding:15px;
  box-shadow:0 0 25px #00ff88;
}

.time{text-align:center;font-size:18px;}

.status{margin-top:10px;padding:5px;border:1px solid #333;text-align:center;}
.red{color:red;}
.green{color:#00ff88;}

button{width:100%;margin:5px 0;padding:12px;background:#111;color:#00ff88;border:none;}

.logs{margin-top:10px;max-height:200px;overflow:auto;background:#000;border:1px solid #333;}
.log-item{padding:6px;border-bottom:1px solid #222;cursor:pointer;}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  display:none;justify-content:center;align-items:center;
}

.box{
  background:#111;padding:20px;border:2px solid #00ff88;width:85%;
}

.box input{width:100%;padding:10px;margin:5px 0;}

.print{
  display:none;background:white;color:black;
  font-family:monospace;padding:10px;
}

.ticket{width:260px;margin:auto;font-size:12px;}
.line{border-top:1px dashed black;margin:5px 0;}
.center{text-align:center;}

@media print {
  body * { display:none; }
  #printArea, #printArea * { display:block; }
}
</style>
</head>

<body>

<div class="container">

<div class="display">
<div class="time" id="time"></div>
<div id="mode"></div>
<div class="status" id="breakStatus"></div>
<div>PRACA (real): <span id="work"></span></div>
<div>JAZDA (real): <span id="drive"></span></div>
</div>

<button onclick="openCard()">WŁÓŻ KARTĘ</button>
<button onclick="setMode('jazda')">JAZDA</button>
<button onclick="setMode('praca')">INNA PRACA</button>
<button onclick="setMode('przerwa')">PRZERWA</button>
<button onclick="openEndModal()">KONIEC PRACY</button>
<button onclick="printLogs()">WYDRUK</button>
<button onclick="weeklyReport()">RAPORT TYGODNIOWY</button>
<button onclick="resetAll()">RESET</button>

<div class="logs" id="logs"></div>

</div>

<div id="printArea" class="print"></div>

<script>

// ===== STATE =====
let state = JSON.parse(localStorage.getItem("tacho")) || {
  logs:[],
  mode:"---",
  driver:false,
  work:0,
  drive:0,
  breakTime:0,
  last:Date.now()
};

// ===== CZAS =====
setInterval(()=>{
  let d=new Date();
  time.innerText=d.toLocaleString("pl-PL",{weekday:'long', day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'});
},1000);

// ===== FORMAT =====
function f(ms){
  let m=Math.floor(ms/60000);
  let h=Math.floor(m/60);
  m=m%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ===== TICK =====
setInterval(()=>{
  let now=Date.now();
  let diff=now-state.last;

  if(state.mode!=="odpoczynek") state.work+=diff;
  if(state.mode==="jazda") state.drive+=diff;
  if(state.mode==="przerwa") state.breakTime+=diff;

  state.last=now;
  save(); render();
},1000);

// ===== PRZERWY =====
function requiredBreak(){
  let d=state.drive/3600000;
  if(d>8) return 45*60000;
  if(d>=6) return 30*60000;
  if(state.work>6*3600000) return 15*60000;
  return 0;
}

// ===== LOG =====
function addLog(t){
  let d=new Date();
  state.logs.unshift({
    date:d.toISOString().slice(0,10),
    time:d.toTimeString().slice(0,5),
    text:t
  });
}

// ===== TRYB =====
function setMode(m){
  if(!state.driver){alert("Włóż kartę!");return;}
  state.mode=m;
  addLog("TRYB: "+m);
}

// ===== KARTA =====
function openCard(){
  let w=prompt("PRACA hh:mm");
  let d=prompt("JAZDA hh:mm");

  let [h1,m1]=w.split(":").map(Number);
  let [h2,m2]=d.split(":").map(Number);

  state.work=((h1*60)+m1)*60000;
  state.drive=((h2*60)+m2)*60000;

  state.driver=true;
  addLog("KARTA WLOZONA");
}

// ===== KONIEC =====
function openEndModal(){
  let h=prompt("Godzina");
  let km=prompt("KM");

  addLog("KONIEC "+h+" KM:"+km);
  addLog("ODPOCZYNEK");
  state.mode="odpoczynek";
}

// ===== WYDRUK =====
function printLogs(){

  function toDate(l){
    let [y,m,d]=l.date.split("-").map(Number);
    let [hh,mm]=l.time.split(":").map(Number);
    return new Date(y,m-1,d,hh,mm);
  }

  let sorted=[...state.logs].sort((a,b)=>toDate(a)-toDate(b));

  let drive=0,work=0,rest=0;

  for(let i=0;i<sorted.length-1;i++){
    let diff=toDate(sorted[i+1])-toDate(sorted[i]);
    let t=sorted[i].text.toLowerCase();

    if(t.includes("jazda")){drive+=diff;work+=diff;}
    else if(t.includes("praca")) work+=diff;
    else if(t.includes("przerwa")) rest+=diff;
  }

  let html=`<div class="ticket">
  <div class="center">*** SIEMENS VDO ***</div>
  <div class="line"></div>`;

  sorted.forEach(l=>{
    html+=`${l.date} ${l.time}<br>${l.text}<div class="line"></div>`;
  });

  html+=`--- PODSUMOWANIE ---<br>
  JAZDA: ${f(drive)}<br>
  PRACA: ${f(work)}<br>
  PRZERWY: ${f(rest)}<br>
  <div class="line"></div>*** END ***</div>`;

  printArea.innerHTML=html;
  printArea.style.display="block";
  window.print();
}

// ===== RAPORT =====
function weeklyReport(){

  function toDate(l){
    let [y,m,d]=l.date.split("-").map(Number);
    let [hh,mm]=l.time.split(":").map(Number);
    return new Date(y,m-1,d,hh,mm);
  }

  let sorted=[...state.logs].sort((a,b)=>toDate(a)-toDate(b));

  let days={};

  for(let i=0;i<sorted.length-1;i++){
    let curr=sorted[i];
    let next=sorted[i+1];
    let diff=toDate(next)-toDate(curr);

    let d=curr.date;
    if(!days[d]) days[d]={drive:0,work:0,rest:0};

    let t=curr.text.toLowerCase();

    if(t.includes("jazda")){days[d].drive+=diff;days[d].work+=diff;}
    else if(t.includes("praca")) days[d].work+=diff;
    else if(t.includes("przerwa")) days[d].rest+=diff;
  }

  let html=`<div class="ticket"><div class="center">*** RAPORT ***</div><div class="line"></div>`;

  Object.keys(days).forEach(d=>{
    html+=`${d}<br>
    JAZDA: ${f(days[d].drive)}<br>
    PRACA: ${f(days[d].work)}<br>
    PRZERWY: ${f(days[d].rest)}<br>
    <div class="line"></div>`;
  });

  html+=`*** END ***</div>`;

  printArea.innerHTML=html;
  printArea.style.display="block";
  window.print();
}

// ===== RENDER =====
function render(){

  work.innerText=f(state.work);
  drive.innerText=f(state.drive);
  mode.innerText="TRYB: "+state.mode;

  let req=requiredBreak();
  breakStatus.innerText=`PRZERWY: ${f(state.breakTime)} / ${f(req)}`;
  breakStatus.className="status "+(state.breakTime>=req?"green":"red");

  logs.innerHTML="";
  state.logs.forEach(l=>{
    let div=document.createElement("div");
    div.className="log-item";
    div.innerText=l.date+" "+l.time+" | "+l.text;
    logs.appendChild(div);
  });
}

// ===== SYSTEM =====
function save(){localStorage.setItem("tacho",JSON.stringify(state));}
function resetAll(){localStorage.removeItem("tacho");location.reload();}

render();

</script>

</body>
</html>
