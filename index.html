<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tacho PRO FINAL</title>

<style>
body {
  background: black;
  color: #00ff88;
  font-family: Arial;
  text-align: center;
}

.box {
  border: 2px solid #00ff88;
  border-radius: 20px;
  padding: 15px;
  margin: 15px;
  box-shadow: 0 0 20px #00ff88;
}

button {
  background: black;
  color: #00ff88;
  border: 2px solid #00ff88;
  border-radius: 50%;
  width: 90px;
  height: 90px;
  font-size: 14px;
  margin: 10px;
}

.logBox {
  max-height: 200px;
  overflow-y: auto;
  text-align: left;
  padding: 10px;
  border-top: 1px solid #00ff88;
}

.logItem {
  padding: 5px;
  border-bottom: 1px solid #003322;
}

.modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalContent {
  background:black;
  border:2px solid #00ff88;
  padding:20px;
  border-radius:20px;
  width:80%;
}

.modalContent input {
  width:100%;
  padding:10px;
  margin:10px 0;
}

.modalContent button {
  width:80px;
  height:40px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
  <div id="time"></div>
  <div>PRACA: <span id="praca">00:00</span></div>
  <div>JAZDA: <span id="jazda">00:00</span></div>
</div>

<div>
  <button onclick="setMode('PRACA')">PRACA</button>
  <button onclick="setMode('JAZDA')">JAZDA</button>
  <button onclick="setMode('PRZERWA')">PAUZA</button>
</div>

<div class="box">
  <div>LOGI:</div>
  <div class="logBox" id="logs"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalContent">
    <input id="editInput">
    <button onclick="saveEdit()">ZAPISZ</button>
    <button onclick="deleteLog()">USUŃ</button>
    <button onclick="closeModal()">ANULUJ</button>
  </div>
</div>

<script>
let currentMode = localStorage.getItem("mode") || "PRACA";
let lastChange = parseInt(localStorage.getItem("lastChange")) || Date.now();

let praca = parseInt(localStorage.getItem("praca")) || 0;
let jazda = parseInt(localStorage.getItem("jazda")) || 0;

let logs = JSON.parse(localStorage.getItem("logs")) || [];

let editIndex = null;

// =====================
// SILNIK CZASU
// =====================
function updateTime() {
  let now = Date.now();
  let diff = Math.floor((now - lastChange) / 1000);

  let tempPraca = praca;
  let tempJazda = jazda;

  if (currentMode === "PRACA") tempPraca += diff;
  if (currentMode === "JAZDA") tempJazda += diff;

  document.getElementById("praca").innerText = format(tempPraca);
  document.getElementById("jazda").innerText = format(tempJazda);

  document.getElementById("time").innerText =
    new Date().toLocaleString();
}

setInterval(updateTime, 1000);

// =====================
// ZMIANA TRYBU
// =====================
function setMode(newMode) {
  if (currentMode === newMode) return;

  let now = Date.now();
  let diff = Math.floor((now - lastChange) / 1000);

  if (currentMode === "PRACA") praca += diff;
  if (currentMode === "JAZDA") jazda += diff;

  lastChange = now;
  currentMode = newMode;

  localStorage.setItem("mode", currentMode);
  localStorage.setItem("lastChange", lastChange);
  localStorage.setItem("praca", praca);
  localStorage.setItem("jazda", jazda);

  addLog("TRYB " + newMode);
}

// =====================
// LOGI
// =====================
function addLog(text) {
  let time = new Date().toLocaleTimeString();
  logs.push(time + " - " + text);
  saveLogs();
  renderLogs();
}

function renderLogs() {
  let box = document.getElementById("logs");
  box.innerHTML = "";

  logs.forEach((log, i) => {
    let div = document.createElement("div");
    div.className = "logItem";
    div.innerText = log;
    div.onclick = () => openModal(i);
    box.appendChild(div);
  });
}

function saveLogs() {
  localStorage.setItem("logs", JSON.stringify(logs));
}

// =====================
// MODAL
// =====================
function openModal(index) {
  editIndex = index;
  document.getElementById("editInput").value = logs[index];
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function saveEdit() {
  logs[editIndex] = document.getElementById("editInput").value;
  saveLogs();
  renderLogs();
  closeModal();
}

function deleteLog() {
  logs.splice(editIndex, 1);
  saveLogs();
  renderLogs();
  closeModal();
}

// =====================
// FORMAT
// =====================
function format(sec) {
  let h = Math.floor(sec / 3600);
  let m = Math.floor((sec % 3600) / 60);
  return String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0');
}

// =====================
// INIT
// =====================
function init() {
  let now = Date.now();
  let diff = Math.floor((now - lastChange) / 1000);

  if (currentMode === "PRACA") praca += diff;
  if (currentMode === "JAZDA") jazda += diff;

  lastChange = now;

  localStorage.setItem("lastChange", lastChange);
  localStorage.setItem("praca", praca);
  localStorage.setItem("jazda", jazda);

  renderLogs();
}

init();
</script>

</body>
</html>
