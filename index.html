<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACHOGRAF MZA PRO v2</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#00ff88;
  font-family:monospace;
}

.container{padding:10px;}

.display{
  background:#000;
  border-radius:15px;
  padding:15px;
  box-shadow:0 0 25px #00ff88;
}

.time{
  font-size:22px;
  text-align:center;
}

.status{
  margin-top:10px;
  padding:5px;
  border:1px solid #333;
  text-align:center;
}

.red{color:red;}
.green{color:#00ff88;}

.buttons button{
  width:100%;
  margin:5px 0;
  padding:12px;
  font-size:16px;
  background:#111;
  color:#00ff88;
  border:none;
}

/* LOGI */
.logs{
  margin-top:10px;
  max-height:200px;
  overflow:auto;
  background:#000;
  padding:5px;
  border:1px solid #333;
}

.log-item{
  padding:5px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  background:#111;
  padding:20px;
  border:2px solid #00ff88;
  width:85%;
}

.box input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.box button{
  width:100%;
  padding:10px;
  margin-top:5px;
}

/* WYDRUK */
.print{
  display:none;
  background:white;
  color:black;
  font-family:monospace;
  padding:20px;
}

.ticket{
  width:100%;
  font-size:12px;
}

.line{
  border-bottom:1px dashed #000;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="display">
<div class="time" id="time"></div>
<div id="mode">TRYB: ---</div>

<div class="status" id="breakStatus"></div>
<div>PRACA: <span id="work"></span></div>
<div>JAZDA: <span id="drive"></span></div>
</div>

<button onclick="openCard()">WŁÓŻ KARTĘ</button>

<div class="buttons">
<button onclick="setMode('jazda')">JAZDA</button>
<button onclick="setMode('praca')">INNA PRACA</button>
<button onclick="setMode('przerwa')">PRZERWA</button>
<button onclick="endDay()">KONIEC PRACY</button>
<button onclick="printLogs()">WYDRUK</button>
<button onclick="resetAll()">RESET</button>
</div>

<div class="logs" id="logs"></div>

</div>

<!-- PANEL KARTY -->
<div class="modal" id="cardModal">
<div class="box">
<h3>KARTA KIEROWCY</h3>
<input id="cardWork" placeholder="PRACA hh:mm">
<input id="cardDrive" placeholder="JAZDA hh:mm">
<button onclick="insertCard()">START</button>
<button onclick="closeCard()">ANULUJ</button>
</div>
</div>

<!-- EDYCJA LOG -->
<div class="modal" id="editModal">
<div class="box">
<input id="editText">
<button onclick="saveLog()">ZAPISZ</button>
<button onclick="deleteLog()">USUŃ</button>
<button onclick="closeEdit()">ANULUJ</button>
</div>
</div>

<div class="print" id="printArea"></div>

<script>
let state = JSON.parse(localStorage.getItem("tacho")) || {
  work:0,
  drive:0,
  breakTime:0,
  mode:"---",
  last:Date.now(),
  logs:[]
};

let editIndex=null;

/* CZAS */
setInterval(()=>{
  let d=new Date();
  document.getElementById("time").innerText =
    d.toLocaleString("pl-PL",{weekday:'long', hour:'2-digit', minute:'2-digit', second:'2-digit', day:'2-digit', month:'2-digit', year:'numeric'});
},1000);

/* FORMAT */
function f(ms){
  let m=Math.floor(ms/60000);
  let h=Math.floor(m/60);
  m=m%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* TICK */
setInterval(()=>{
  let now=Date.now();
  let diff=now-state.last;

  if(state.mode!=="---") state.work+=diff;
  if(state.mode==="jazda") state.drive+=diff;
  if(state.mode==="przerwa") state.breakTime+=diff;

  state.last=now;
  save();
  render();
},1000);

/* PRZERWY */
function reqBreak(){
  let d=state.drive/3600000;
  if(d>8) return 45*60000;
  if(d>=6) return 30*60000;
  if(state.work>6*3600000) return 15*60000;
  return 0;
}

/* RENDER */
function render(){
  document.getElementById("work").innerText=f(state.work);
  document.getElementById("drive").innerText=f(state.drive);

  let req=reqBreak();
  let el=document.getElementById("breakStatus");

  el.innerText="PRZERWY: "+f(state.breakTime)+" / "+f(req);
  el.className="status "+(state.breakTime>=req?"green":"red");

  document.getElementById("mode").innerText="TRYB: "+state.mode.toUpperCase();

  let logsEl=document.getElementById("logs");
  logsEl.innerHTML="";
  state.logs.forEach((l,i)=>{
    let div=document.createElement("div");
    div.className="log-item";
    div.innerText=l.time+" | "+l.text;
    div.onclick=()=>editLog(i);
    logsEl.appendChild(div);
  });
}

/* TRYB */
function setMode(m){
  state.mode=m;
  addLog("TRYB: "+m);
}

/* PANEL KARTY */
function openCard(){document.getElementById("cardModal").style.display="flex";}
function closeCard(){document.getElementById("cardModal").style.display="none";}

function insertCard(){
  let w=document.getElementById("cardWork").value;
  let d=document.getElementById("cardDrive").value;

  let [h1,m1]=w.split(":").map(Number);
  let [h2,m2]=d.split(":").map(Number);

  if(isNaN(h1)||isNaN(m1)||isNaN(h2)||isNaN(m2)) return alert("Błąd danych");

  state.work=((h1*60)+m1)*60000;
  state.drive=((h2*60)+m2)*60000;

  addLog("KARTA WŁOŻONA");
  closeCard();
}

/* LOGI */
function addLog(t){
  state.logs.unshift({time:new Date().toLocaleString(), text:t});
}

function editLog(i){
  editIndex=i;
  document.getElementById("editText").value=state.logs[i].text;
  document.getElementById("editModal").style.display="flex";
}

function saveLog(){
  state.logs[editIndex].text=document.getElementById("editText").value;
  closeEdit(); save();
}

function deleteLog(){
  state.logs.splice(editIndex,1);
  closeEdit(); save();
}

function closeEdit(){document.getElementById("editModal").style.display="none";}

/* KONIEC */
function endDay(){
  let h=prompt("Godzina hh:mm");
  let km=prompt("KM");
  addLog("KONIEC "+h+" KM:"+km);
}

/* WYDRUK */
function printLogs(){
  let html=`
  <div class="ticket">
  ==== SIEMENS VDO ====<br>
  DATA: ${new Date().toLocaleDateString()}<br>
  ---------------------<br>
  PRACA: ${f(state.work)}<br>
  JAZDA: ${f(state.drive)}<br>
  PRZERWY: ${f(state.breakTime)}<br>
  ---------------------<br>
  LOGI:<br>
  `;

  state.logs.slice(0,40).forEach(l=>{
    html+=`${l.time}<br>${l.text}<div class="line"></div>`;
  });

  html+="</div>";

  let p=document.getElementById("printArea");
  p.innerHTML=html;
  p.style.display="block";
  window.print();
}

/* RESET */
function resetAll(){
  if(confirm("RESET?")){
    localStorage.removeItem("tacho");
    location.reload();
  }
}

/* SAVE */
function save(){
  localStorage.setItem("tacho", JSON.stringify(state));
}

render();
</script>

</body>
</html>
