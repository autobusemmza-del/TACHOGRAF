<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACHOGRAF MZA PRO v3.2</title>

<style>
body{margin:0;background:#0a0a0a;color:#00ff88;font-family:monospace;}
.container{padding:10px;}

.display{
  background:#000;
  border-radius:15px;
  padding:15px;
  box-shadow:0 0 25px #00ff88;
}

.time{text-align:center;font-size:18px;}
.status{margin-top:10px;padding:5px;border:1px solid #333;text-align:center;}
.red{color:red;} .green{color:#00ff88;}

button{
  width:100%;margin:5px 0;padding:12px;
  background:#111;color:#00ff88;border:none;
}

/* LOGI */
.logs{margin-top:10px;max-height:200px;overflow:auto;background:#000;border:1px solid #333;}
.log-item{padding:6px;border-bottom:1px solid #222;cursor:pointer;}

/* MODAL */
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  display:none;justify-content:center;align-items:center;
  z-index:99999;
}

.box{
  background:#111;padding:20px;border:2px solid #00ff88;width:85%;
}

.box input{
  width:100%;padding:10px;margin:5px 0;font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<div class="display">
<div class="time" id="time"></div>
<div id="mode">TRYB: ---</div>

<div class="status" id="breakStatus"></div>

<div>PRACA (deklar): <span id="workDecl"></span></div>
<div>PRACA (real): <span id="workReal"></span></div>

<div>JAZDA (deklar): <span id="driveDecl"></span></div>
<div>JAZDA (real): <span id="driveReal"></span></div>

</div>

<button onclick="openCard()">WŁÓŻ KARTĘ</button>

<button onclick="setMode('jazda')">JAZDA</button>
<button onclick="setMode('praca')">INNA PRACA</button>
<button onclick="setMode('przerwa')">PRZERWA</button>
<button onclick="openEndModal()">KONIEC PRACY</button>
<button onclick="resetAll()">RESET</button>

<div class="logs" id="logs"></div>

</div>

<!-- KARTA -->
<div class="modal" id="cardModal">
<div class="box">
<h3>KARTA</h3>
<input id="cardName" placeholder="Imię">
<input id="cardSurname" placeholder="Nazwisko">
<input id="cardNumber" placeholder="Nr karty">
<input id="cardWork" placeholder="PRACA hh:mm">
<input id="cardDrive" placeholder="JAZDA hh:mm">
<button onclick="insertCard()">START</button>
<button onclick="closeCard()">ANULUJ</button>
</div>
</div>

<!-- EDYCJA LOG -->
<div class="modal" id="editModal">
<div class="box">
<input id="editText">
<button onclick="saveLog()">ZAPISZ</button>
<button onclick="deleteLog()">USUŃ</button>
<button onclick="closeEdit()">ANULUJ</button>
</div>
</div>

<!-- KONIEC -->
<div class="modal" id="endModal">
<div class="box">
<h3>KONIEC PRACY</h3>
<input id="endHour" placeholder="Godzina hh:mm">
<input id="endKm" placeholder="Kilometry">
<button onclick="saveEnd()">ZAPISZ</button>
<button onclick="closeEnd()">ANULUJ</button>
</div>
</div>

<script>
let state = JSON.parse(localStorage.getItem("tacho")) || {
  work:0,
  drive:0,
  realWork:0,
  realDrive:0,
  breakTime:0,
  mode:"---",
  last:Date.now(),
  logs:[],
  driver:null
};

let editIndex=null;

/* TIME */
setInterval(()=>{
  let d=new Date();
  document.getElementById("time").innerText =
    d.toLocaleString("pl-PL");
},1000);

/* FORMAT */
function f(ms){
  let m=Math.floor(ms/60000);
  let h=Math.floor(m/60);
  m=m%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* TICK */
setInterval(()=>{
  let now=Date.now();
  let diff=now-state.last;

  if(state.mode!=="---") state.realWork+=diff;
  if(state.mode==="jazda") state.realDrive+=diff;
  if(state.mode==="przerwa") state.breakTime+=diff;

  state.last=now;
  save();
  render();
},1000);

/* RENDER */
function render(){
  document.getElementById("workDecl").innerText=f(state.work);
  document.getElementById("driveDecl").innerText=f(state.drive);
  document.getElementById("workReal").innerText=f(state.realWork);
  document.getElementById("driveReal").innerText=f(state.realDrive);

  document.getElementById("mode").innerText="TRYB: "+state.mode;

  let logsEl=document.getElementById("logs");
  logsEl.innerHTML="";
  state.logs.forEach((l,i)=>{
    let div=document.createElement("div");
    div.className="log-item";
    div.innerText=l.time+" | "+l.text;
    div.onclick=()=>editLog(i);
    logsEl.appendChild(div);
  });
}

/* TRYB */
function setMode(m){
  if(!state.driver){alert("Włóż kartę!");return;}
  state.mode=m;
  addLog("TRYB: "+m);
}

/* KARTA */
function openCard(){document.getElementById("cardModal").style.display="flex";}
function closeCard(){document.getElementById("cardModal").style.display="none";}

function insertCard(){
  let name=document.getElementById("cardName").value;
  let surname=document.getElementById("cardSurname").value;
  let number=document.getElementById("cardNumber").value;

  let [h1,m1]=document.getElementById("cardWork").value.split(":").map(Number);
  let [h2,m2]=document.getElementById("cardDrive").value.split(":").map(Number);

  if(!name||!surname||!number){alert("Dane!");return;}
  if(isNaN(h1)||isNaN(m1)||isNaN(h2)||isNaN(m2)){alert("Czas!");return;}

  state.driver={name,surname,number};
  state.work=((h1*60)+m1)*60000;
  state.drive=((h2*60)+m2)*60000;

  addLog("KARTA: "+name+" "+surname);
  closeCard();
}

/* LOGI */
function addLog(t){
  state.logs.unshift({time:new Date().toLocaleString(), text:t});
}

function editLog(i){
  editIndex=i;
  document.getElementById("editText").value=state.logs[i].text;
  document.getElementById("editModal").style.display="flex";
}

function saveLog(){
  state.logs[editIndex].text=document.getElementById("editText").value;
  closeEdit(); save();
}

function deleteLog(){
  state.logs.splice(editIndex,1);
  closeEdit(); save();
}

function closeEdit(){
  document.getElementById("editModal").style.display="none";
}

/* KONIEC */
function openEndModal(){
  document.getElementById("endModal").style.display="flex";
}

function closeEnd(){
  document.getElementById("endModal").style.display="none";
}

function saveEnd(){
  let h=document.getElementById("endHour").value;
  let km=document.getElementById("endKm").value;
  addLog("KONIEC "+h+" KM:"+km);
  closeEnd();
}

/* RESET */
function resetAll(){
  localStorage.removeItem("tacho");
  location.reload();
}

/* SAVE */
function save(){
  localStorage.setItem("tacho", JSON.stringify(state));
}

render();
</script>

</body>
</html>
