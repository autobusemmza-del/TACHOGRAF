<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACHOGRAF MZA PRO v3.1</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#00ff88;
  font-family:monospace;
}

.container{padding:10px;}

.display{
  background:#000;
  border-radius:15px;
  padding:15px;
  box-shadow:0 0 25px #00ff88;
}

.time{
  font-size:20px;
  text-align:center;
}

.status{
  margin-top:10px;
  padding:5px;
  border:1px solid #333;
  text-align:center;
}

.red{color:red;}
.green{color:#00ff88;}

button{
  width:100%;
  margin:5px 0;
  padding:12px;
  background:#111;
  color:#00ff88;
  border:none;
  font-size:16px;
}

/* LOGI */
.logs{
  margin-top:10px;
  max-height:200px;
  overflow:auto;
  background:#000;
  border:1px solid #333;
}

.log-item{
  padding:6px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

/* MODALE */
.modal{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
  pointer-events:auto;
}

.box{
  background:#111;
  padding:20px;
  border:2px solid #00ff88;
  width:85%;
}

.box input{
  width:100%;
  padding:10px;
  margin:5px 0;
  font-size:16px;
}

/* WYDRUK */
@media print {
  body * { display:none; }
  #printArea, #printArea * { display:block; }
}

.print{
  display:none;
  background:white;
  color:black;
  font-family:monospace;
  padding:10px;
}

.ticket{
  width:260px;
  margin:auto;
  font-size:12px;
}

.center{text-align:center;}
.line{border-top:1px dashed black; margin:5px 0;}
</style>
</head>

<body>

<div class="container">

<div class="display">
<div class="time" id="time"></div>
<div id="mode">TRYB: ---</div>

<div class="status" id="breakStatus"></div>
<div>PRACA: <span id="work"></span></div>
<div>JAZDA: <span id="drive"></span></div>
</div>

<button onclick="openCard()">WŁÓŻ KARTĘ</button>

<button onclick="setMode('jazda')">JAZDA</button>
<button onclick="setMode('praca')">INNA PRACA</button>
<button onclick="setMode('przerwa')">PRZERWA</button>
<button onclick="endDay()">KONIEC PRACY</button>
<button onclick="printLogs()">WYDRUK</button>
<button onclick="resetAll()">RESET</button>

<div class="logs" id="logs"></div>

</div>

<!-- MODAL KARTA -->
<div class="modal" id="cardModal">
<div class="box">
<h3>KARTA KIEROWCY</h3>

<input id="cardName" placeholder="Imię">
<input id="cardSurname" placeholder="Nazwisko">
<input id="cardNumber" placeholder="Nr karty">

<input id="cardWork" placeholder="PRACA hh:mm">
<input id="cardDrive" placeholder="JAZDA hh:mm">

<button onclick="insertCard()">START</button>
<button onclick="closeCard()">ANULUJ</button>
</div>
</div>

<div id="printArea" class="print"></div>

<script>
let state = JSON.parse(localStorage.getItem("tacho")) || {
  work:0,
  drive:0,
  breakTime:0,
  mode:"---",
  last:Date.now(),
  logs:[],
  driver:null
};

/* CZAS */
setInterval(()=>{
  let d=new Date();
  document.getElementById("time").innerText =
    d.toLocaleString("pl-PL",{weekday:'long', hour:'2-digit', minute:'2-digit', second:'2-digit', day:'2-digit', month:'2-digit', year:'numeric'});
},1000);

/* FORMAT */
function f(ms){
  let m=Math.floor(ms/60000);
  let h=Math.floor(m/60);
  m=m%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* TICK */
setInterval(()=>{
  let now=Date.now();
  let diff=now-state.last;

  if(state.mode!=="---") state.work+=diff;
  if(state.mode==="jazda") state.drive+=diff;
  if(state.mode==="przerwa") state.breakTime+=diff;

  state.last=now;
  save();
  render();
},1000);

/* PRZERWY */
function reqBreak(){
  let d=state.drive/3600000;
  if(d>8) return 45*60000;
  if(d>=6) return 30*60000;
  if(state.work>6*3600000) return 15*60000;
  return 0;
}

/* RENDER */
function render(){
  document.getElementById("work").innerText=f(state.work);
  document.getElementById("drive").innerText=f(state.drive);

  let req=reqBreak();
  let el=document.getElementById("breakStatus");

  el.innerText="PRZERWY: "+f(state.breakTime)+" / "+f(req);
  el.className="status "+(state.breakTime>=req?"green":"red");

  document.getElementById("mode").innerText="TRYB: "+state.mode.toUpperCase();

  let logsEl=document.getElementById("logs");
  logsEl.innerHTML="";
  state.logs.forEach(l=>{
    let div=document.createElement("div");
    div.className="log-item";
    div.innerText=l.time+" | "+l.text;
    logsEl.appendChild(div);
  });
}

/* TRYB */
function setMode(m){
  if(!state.driver){
    alert("Najpierw włóż kartę!");
    return;
  }
  state.mode=m;
  addLog("TRYB: "+m);
}

/* KARTA */
function openCard(){
  document.getElementById("cardModal").style.display="flex";
}

function closeCard(){
  document.getElementById("cardModal").style.display="none";
}

function insertCard(){
  let name=document.getElementById("cardName").value;
  let surname=document.getElementById("cardSurname").value;
  let number=document.getElementById("cardNumber").value;

  let w=document.getElementById("cardWork").value;
  let d=document.getElementById("cardDrive").value;

  let [h1,m1]=w.split(":").map(Number);
  let [h2,m2]=d.split(":").map(Number);

  if(!name || !surname || !number){
    alert("Uzupełnij dane kierowcy");
    return;
  }

  if(isNaN(h1)||isNaN(m1)||isNaN(h2)||isNaN(m2)){
    alert("Błędny format czasu");
    return;
  }

  state.driver={name,surname,number};
  state.work=((h1*60)+m1)*60000;
  state.drive=((h2*60)+m2)*60000;

  addLog("KARTA WŁOŻONA: "+name+" "+surname);

  closeCard();
  save();
  render();
}

/* LOGI */
function addLog(t){
  state.logs.unshift({time:new Date().toLocaleString(), text:t});
}

/* KONIEC */
function endDay(){
  let h=prompt("Godzina hh:mm");
  let km=prompt("KM");
  addLog("KONIEC "+h+" KM:"+km);
}

/* WYDRUK */
function printLogs(){
  let html=`
  <div class="ticket">
  <div class="center">*** SIEMENS VDO ***</div>
  <div class="line"></div>

  KIEROWCA:<br>
  ${state.driver?.name || "---"} ${state.driver?.surname || ""}<br>
  NR: ${state.driver?.number || "---"}<br>

  <div class="line"></div>

  PRACA: ${f(state.work)}<br>
  JAZDA: ${f(state.drive)}<br>
  PRZERWY: ${f(state.breakTime)}<br>

  <div class="line"></div>

  ZDARZENIA:<br>
  `;

  state.logs.slice(0,40).reverse().forEach(l=>{
    html+=`${l.time}<br>${l.text}<br>`;
  });

  html+=`<div class="line"></div>*** END ***</div>`;

  let p=document.getElementById("printArea");
  p.innerHTML=html;
  p.style.display="block";

  window.print();
}

/* RESET */
function resetAll(){
  localStorage.removeItem("tacho");
  location.reload();
}

/* SAVE */
function save(){
  localStorage.setItem("tacho", JSON.stringify(state));
}

render();
</script>

</body>
</html>
