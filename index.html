<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tacho PRO MAX v2</title>

<style>
body {
  margin:0;
  background:#050505;
  color:#00ff88;
  font-family:Arial;
  text-align:center;
}

/* PANEL */
.panel {
  margin:15px;
  padding:15px;
  border-radius:20px;
  border:2px solid #00ff88;
  box-shadow:0 0 25px #00ff88;
}

.time {
  font-size:14px;
  opacity:0.7;
}

.big {
  font-size:22px;
  margin:5px 0;
}

/* BUTTONY */
.grid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
  margin:20px;
}

.btn {
  border:2px solid #00ff88;
  border-radius:50%;
  padding:20px;
  box-shadow:0 0 15px #00ff88;
  cursor:pointer;
}

/* LOGI */
.logs {
  margin:15px;
  padding:10px;
  border-radius:20px;
  border:2px solid #00ff88;
  box-shadow:0 0 20px #00ff88;
  max-height:250px;
  overflow:auto;
  text-align:left;
}

.logItem {
  padding:6px;
  border-bottom:1px solid #003322;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
}

.modalBox {
  background:#000;
  border:2px solid #00ff88;
  padding:20px;
  border-radius:20px;
  width:85%;
}

.modalBox input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

.modalBox button {
  margin:5px;
  padding:10px;
  border:1px solid #00ff88;
  background:black;
  color:#00ff88;
}
</style>
</head>

<body>

<div class="panel">
  <div id="date" class="time"></div>
  <div class="big">PRACA: <span id="praca">00:00</span></div>
  <div class="big">JAZDA: <span id="jazda">00:00</span></div>
  <div id="mode">TRYB: PRACA</div>
</div>

<div class="grid">
  <div class="btn" onclick="setMode('PRACA')">PRACA</div>
  <div class="btn" onclick="setMode('JAZDA')">JAZDA</div>
  <div class="btn" onclick="setMode('PRZERWA')">PAUZA</div>
</div>

<div class="logs" id="logs"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">
    <input id="editInput">
    <br>
    <button onclick="saveEdit()">ZAPISZ</button>
    <button onclick="deleteLog()">USUŃ</button>
    <button onclick="closeModal()">ANULUJ</button>
  </div>
</div>

<script>
let mode = localStorage.getItem("mode") || "PRACA";
let last = parseInt(localStorage.getItem("last")) || Date.now();

let praca = parseInt(localStorage.getItem("praca")) || 0;
let jazda = parseInt(localStorage.getItem("jazda")) || 0;

let logs = JSON.parse(localStorage.getItem("logs")) || [];
let editIndex = null;

// ================= TIME ENGINE =================
function tick() {
  let now = Date.now();
  let diff = Math.floor((now - last) / 1000);

  let p = praca;
  let j = jazda;

  if (mode === "PRACA") p += diff;
  if (mode === "JAZDA") j += diff;

  document.getElementById("praca").innerText = format(p);
  document.getElementById("jazda").innerText = format(j);
  document.getElementById("mode").innerText = "TRYB: " + mode;
  document.getElementById("date").innerText = new Date().toLocaleString();
}

setInterval(tick,1000);

// ================= MODE =================
function setMode(newMode) {
  if (mode === newMode) return;

  let now = Date.now();
  let diff = Math.floor((now - last) / 1000);

  if (mode === "PRACA") praca += diff;
  if (mode === "JAZDA") jazda += diff;

  last = now;
  mode = newMode;

  saveState();
  addLog("TRYB " + newMode);
}

// ================= LOGS =================
function addLog(txt) {
  let t = new Date().toLocaleTimeString();
  logs.unshift(t + " - " + txt);
  saveLogs();
  renderLogs();
}

function renderLogs() {
  let box = document.getElementById("logs");
  box.innerHTML = "";

  logs.forEach((l,i)=>{
    let d=document.createElement("div");
    d.className="logItem";
    d.innerText=l;
    d.onclick=()=>openModal(i);
    box.appendChild(d);
  });
}

function saveLogs() {
  localStorage.setItem("logs", JSON.stringify(logs));
}

// ================= MODAL =================
function openModal(i){
  editIndex=i;
  document.getElementById("editInput").value=logs[i];
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function saveEdit(){
  logs[editIndex]=document.getElementById("editInput").value;
  saveLogs();
  renderLogs();
  closeModal();
}

function deleteLog(){
  logs.splice(editIndex,1);
  saveLogs();
  renderLogs();
  closeModal();
}

// ================= INIT =================
function saveState(){
  localStorage.setItem("mode",mode);
  localStorage.setItem("last",last);
  localStorage.setItem("praca",praca);
  localStorage.setItem("jazda",jazda);
}

function init(){
  let now = Date.now();
  let diff = Math.floor((now - last)/1000);

  if(mode==="PRACA") praca+=diff;
  if(mode==="JAZDA") jazda+=diff;

  last=now;
  saveState();
  renderLogs();
}

function format(s){
  let h=Math.floor(s/3600);
  let m=Math.floor((s%3600)/60);
  return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');
}

init();
</script>

</body>
</html>
