<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACHOGRAF MZA PRO</title>

<style>
body {
  margin:0;
  background:#111;
  color:#0f0;
  font-family:monospace;
}

.container {
  padding:10px;
}

/* WYŚWIETLACZ */
.display {
  background:#000;
  border:3px solid #333;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 20px #0f0 inset;
}

.time {
  font-size:22px;
  text-align:center;
}

.status {
  margin-top:10px;
  padding:5px;
  text-align:center;
  border:1px solid #333;
}

.red { color:red; }
.green { color:#0f0; }

/* SLOT KARTY */
.card-slot {
  margin:10px 0;
  padding:10px;
  border:2px dashed #555;
  text-align:center;
}

/* PRZYCISKI */
.buttons button {
  width:100%;
  margin:5px 0;
  padding:10px;
  font-size:16px;
  background:#222;
  color:#0f0;
  border:none;
}

/* LOGI */
.logs {
  margin-top:10px;
  max-height:200px;
  overflow:auto;
  background:#000;
  padding:5px;
  border:1px solid #333;
}

.log-item {
  padding:5px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111;
  padding:20px;
  border:2px solid #0f0;
  width:80%;
}

.modal-content input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

.modal-content button {
  width:100%;
  padding:10px;
  margin-top:5px;
}

/* WYDRUK */
.print {
  display:none;
  background:white;
  color:black;
  padding:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="display">
<div class="time" id="time"></div>
<div id="mode">TRYB: BRAK</div>

<div class="status" id="breakStatus">PRZERWY: 00:00</div>
<div>PRACA: <span id="work">00:00</span></div>
<div>JAZDA: <span id="drive">00:00</span></div>
</div>

<div class="card-slot">
<button onclick="insertCard()">WŁÓŻ KARTĘ</button>
</div>

<div class="buttons">
<button onclick="setMode('jazda')">JAZDA</button>
<button onclick="setMode('praca')">INNA PRACA</button>
<button onclick="setMode('przerwa')">PRZERWA</button>
<button onclick="endDay()">KONIEC PRACY</button>
<button onclick="printLogs()">WYDRUK</button>
<button onclick="resetAll()">RESET</button>
</div>

<div class="logs" id="logs"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<input id="editText">
<button onclick="saveLog()">ZAPISZ</button>
<button onclick="deleteLog()">USUŃ</button>
<button onclick="closeModal()">ANULUJ</button>
</div>
</div>

<div class="print" id="printArea"></div>

<script>
let state = JSON.parse(localStorage.getItem("tachograf")) || {
  work:0,
  drive:0,
  breakTime:0,
  mode:"brak",
  last:Date.now(),
  logs:[],
  card:false
};

let editIndex = null;

/* CZAS */
function updateTime(){
  let now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleString("pl-PL", { weekday:'long', hour:'2-digit', minute:'2-digit', second:'2-digit', day:'2-digit', month:'2-digit', year:'numeric' });
}
setInterval(updateTime,1000);

/* FORMAT */
function format(ms){
  let m = Math.floor(ms/60000);
  let h = Math.floor(m/60);
  m = m%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* LICZNIK */
function tick(){
  let now = Date.now();
  let diff = now - state.last;

  if(state.mode !== "brak"){
    state.work += diff;
  }

  if(state.mode === "jazda"){
    state.drive += diff;
  }

  if(state.mode === "przerwa"){
    state.breakTime += diff;
  }

  state.last = now;
  save();
  render();
}
setInterval(tick,1000);

/* PRZERWY */
function requiredBreak(){
  let h = state.drive / 3600000;

  if(h > 8) return 45*60000;
  if(h >= 6) return 30*60000;
  if(state.work > 6*3600000) return 15*60000;
  return 0;
}

/* RENDER */
function render(){
  document.getElementById("work").innerText = format(state.work);
  document.getElementById("drive").innerText = format(state.drive);

  let req = requiredBreak();
  let status = document.getElementById("breakStatus");

  status.innerText = "PRZERWY: " + format(state.breakTime) + " / " + format(req);

  if(state.breakTime >= req){
    status.className = "status green";
  } else {
    status.className = "status red";
  }

  document.getElementById("mode").innerText = "TRYB: " + state.mode.toUpperCase();

  renderLogs();
}

/* TRYB */
function setMode(m){
  state.mode = m;
  addLog("TRYB: " + m);
}

/* KARTA */
function insertCard(){
  state.card = true;
  let p = prompt("Podaj czas pracy (hh:mm)");
  let j = prompt("Podaj czas jazdy (hh:mm)");

  if(p){
    let [h,m]=p.split(":");
    state.work = (h*60+m)*60000;
  }

  if(j){
    let [h,m]=j.split(":");
    state.drive = (h*60+m)*60000;
  }

  addLog("KARTA WŁOŻONA");
}

/* LOGI */
function addLog(txt){
  state.logs.unshift({
    time:new Date().toLocaleString(),
    text:txt
  });
  save();
}

function renderLogs(){
  let el = document.getElementById("logs");
  el.innerHTML = "";

  state.logs.forEach((l,i)=>{
    let div = document.createElement("div");
    div.className="log-item";
    div.innerText = l.time + " | " + l.text;
    div.onclick = ()=>editLog(i);
    el.appendChild(div);
  });
}

/* EDYCJA */
function editLog(i){
  editIndex = i;
  document.getElementById("editText").value = state.logs[i].text;
  document.getElementById("modal").style.display="flex";
}

function saveLog(){
  state.logs[editIndex].text = document.getElementById("editText").value;
  closeModal();
  save();
}

function deleteLog(){
  state.logs.splice(editIndex,1);
  closeModal();
  save();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* KONIEC DNIA */
function endDay(){
  let hour = prompt("Godzina zakończenia (hh:mm)");
  let km = prompt("Kilometry");

  addLog("KONIEC: "+hour+" KM:"+km);
}

/* WYDRUK */
function printLogs(){
  let html = "<h2>WYDRUK TACHOGRAF</h2>";

  state.logs.slice(0,50).forEach(l=>{
    html += `<div>${l.time} | ${l.text}</div>`;
  });

  let p = document.getElementById("printArea");
  p.innerHTML = html;
  p.style.display="block";
  window.print();
}

/* RESET */
function resetAll(){
  if(confirm("RESET?")){
    localStorage.removeItem("tachograf");
    location.reload();
  }
}

/* SAVE */
function save(){
  localStorage.setItem("tachograf", JSON.stringify(state));
}

/* START */
render();
</script>

</body>
</html>
